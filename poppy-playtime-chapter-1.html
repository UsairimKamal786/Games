
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Main Menu</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* Background image */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://tse3.mm.bing.net/th/id/OIP.UQRbiONoNo_VtHeeGTRWqgHaEK?rs=1&pid=ImgDetMain&o=7&rm=3");
  background-size: cover;
  background-position: center;
  filter: brightness(0.6);
}

/* Play button (same area as your old NEW GAME) */
.play-btn {
  position: absolute;
  bottom: 22%;
  left: 5%;
  padding: 12px 40px;
  font-size: 22px;
  border: 2px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
  letter-spacing: 2px;
  transition: 0.2s;
}

.play-btn:hover {
  background: white;
  color: black;
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="bg"></div>

<button class="play-btn" onclick="playGame()">PLAY</button>

<script>
function playGame() {
  window.location.href = "poppy-playtime-1-main.html";
}
</script>

</body>
</html>
